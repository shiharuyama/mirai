<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社みらい建設</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/works.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <!-- ---------------------------------------------------------------------ヘッダー -->
    <header>
        <div class="header-inner">



            <div class="header-title">
                <a href="index.html">
                    <p class="text-subheading">
                        <span class="text-secondary">株式会社</span>
                        <span class="text-primary">みらい建設</span>
                    </p>
                </a>
            </div>



            <div class="header-contact-wrap">



                <div class="header-sns">
                    <a href="#"><i aria-hidden="true"
                            class="fa-brands fa-x-twitter text-primary text-subheading"></i></a>
                    <a href="#"><i aria-hidden="true"
                            class="fa-brands fa-facebook text-primary text-subheading"></i></a>
                    <a href="#"><i aria-hidden="true"
                            class="fa-brands fa-instagram text-primary text-subheading"></i></a>
                </div>

                <div class="header-contact">
                    <a href="#">
                        <p>お問い合わせ</p>
                        <p class="text-small">コンタクト</p>
                    </a>
                </div>



            </div>
        </div>
    </header>







    <!-- -----------------------------------------------------------------------------施工事例 -->

    <section class="business-contents">
        <div class="section-inner">



            <div class="sub-title">
                <h2 class="text-subheading">施工事例</h2>
                <p class="text-small">Works</p>
            </div>




            <div class="works-contents" id="works-contents01">

                <div>
                    <h3>公共施設 新築工事</h3>
                </div>


                <div class="works-grid">

                    <div class="works-img">
                        <img src="./images/img/6.ex.jpg" alt="公共施設 新築工事01">
                    </div>

                    <div class="works-img">
                        <img src="./images/img/10.ex.jpg" alt="公共施設 新築工事02">
                    </div>

                </div>


            </div>
            <div class="works-contents" id="works-contents02">

                <div>
                    <h3>集合住宅 建築工事</h3>
                </div>


                <div class="works-grid">

                    <div class="works-img">
                        <img src="./images/img/7.ex.jpg" alt="集合住宅 建築工事01">
                    </div>

                    <div class="works-img">
                        <img src="./images/img/11.ex.jpg" alt="集合住宅 建築工事02">
                    </div>

                </div>


            </div>
            <div class="works-contents" id="works-contents03">

                <div>
                    <h3>店舗 改修工事</h3>
                </div>


                <div class="works-grid">

                    <div class="works-img">
                        <img src="./images/img/8.ex.jpg" alt="店舗 改修工事01">
                    </div>

                    <div class="works-img">
                        <img src="./images/img/12.ex.jpg" alt="店舗 改修工事02">
                    </div>

                </div>


            </div>
            <div class="works-contents" id="works-contents04">

                <div>
                    <h3>外構 造成工事</h3>
                </div>


                <div class="works-grid">

                    <div class="works-img">
                        <img src="./images/img/9.ex.jpg" alt="外構 造成工事01">
                    </div>

                    <div class="works-img">
                        <img src="./images/img/13.ex.jpg" alt="外構 造成工事02">
                    </div>

                </div>

            </div>

        </div>

    </section>




    <!-- -----------------------------------------------------------------------------フッター -->
    <footer>
        <div class="footer-band">

            <div class="footer-rogo">
                <img src="./images/svg/footer_logo.svg" alt="ロゴ">
            </div>

        </div>


        <div class="footer-contents">


            <div class="footer-sns">
                <a href="#"><i aria-hidden="true" class="fa-brands fa-x-twitter text-subheading"></i></a>
                <a href="#"><i aria-hidden="true" class="fa-brands fa-facebook text-subheading"></i></a>
                <a href="#"><i aria-hidden="true" class="fa-brands fa-instagram text-subheading"></i></a>
            </div>

            <div class="contact-button"><a href="#"><img src="./images/svg/contact.svg" alt="お問い合わせボタン"></a></div>

            <div class="copy-right">
                <p class="text-caption">&copy;2026 株式会社みらい建設</p>
            </div>

        </div>


    </footer>

</body>

</html>
